<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal — AI Video Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1B36;
    --navy-light:#16294C;
    --navy-soft:#1E3A63;
    --bg:#F5F7FA;
    --card:#FFFFFF;
    --border:#E2E8F0;
    --text:#0F1B2D;
    --muted:#5B6B85;
    --accent:#17C3B2;
    --accent-dark:#0EA79A;
    --green:#16A34A;
    --green-bg:#EAFBF1;
    --amber:#D97706;
    --amber-bg:#FEF6E7;
    --red:#DC2626;
    --red-bg:#FDECEC;
    --radius:12px;
    --shadow:0 1px 2px rgba(11,27,54,.06), 0 8px 24px rgba(11,27,54,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;margin:0;letter-spacing:-0.01em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  #app{min-height:100vh;display:flex;flex-direction:column;}

  /* ---------- Signal mark ---------- */
  .signal-mark{display:inline-flex;align-items:flex-end;gap:2px;height:18px;}
  .signal-mark span{width:3px;background:var(--accent);border-radius:1px;display:block;}
  .signal-mark span:nth-child(1){height:40%;}
  .signal-mark span:nth-child(2){height:70%;}
  .signal-mark span:nth-child(3){height:100%;}
  .signal-mark span:nth-child(4){height:55%;}
  .signal-mark.pulse span{animation:pulse 1.1s ease-in-out infinite;}
  .signal-mark.pulse span:nth-child(1){animation-delay:.0s;}
  .signal-mark.pulse span:nth-child(2){animation-delay:.15s;}
  .signal-mark.pulse span:nth-child(3){animation-delay:.3s;}
  .signal-mark.pulse span:nth-child(4){animation-delay:.45s;}
  @keyframes pulse{0%,100%{opacity:.35;transform:scaleY(.5);}50%{opacity:1;transform:scaleY(1);}}

  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:#fff;}
  .brand .sub{font-weight:500;font-size:11px;color:#9FB2CE;letter-spacing:.04em;text-transform:uppercase;margin-top:1px;}

  /* ---------- Gate ---------- */
  .gate-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:
      radial-gradient(circle at 20% 20%, rgba(23,195,178,.14), transparent 45%),
      radial-gradient(circle at 80% 80%, rgba(23,195,178,.10), transparent 40%),
      var(--navy);
    padding:24px;}
  .gate-card{background:var(--card);border-radius:16px;padding:40px 36px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35);}
  .gate-card .signal-mark{margin-bottom:18px;}
  .gate-card h1{font-size:22px;margin-bottom:6px;}
  .gate-card p{color:var(--muted);font-size:14px;margin:0 0 22px;line-height:1.5;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em;}
  input[type=text],input[type=password],input[type=number],select,textarea{
    width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:border-color .15s;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--accent);}
  textarea{resize:vertical;min-height:70px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:9px;padding:11px 18px;font-weight:600;font-size:14px;transition:all .15s;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-light);}
  .btn-accent{background:var(--accent);color:#04241F;}
  .btn-accent:hover{background:var(--accent-dark);color:#fff;}
  .btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--border);}
  .btn-ghost:hover{border-color:var(--navy);}
  .btn-danger{background:var(--red-bg);color:var(--red);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .btn-block{width:100%;}
  .error-text{color:var(--red);font-size:13px;margin-top:10px;}

  /* ---------- Shell ---------- */
  .shell{flex:1;display:flex;}
  .sidebar{width:230px;background:var(--navy);color:#fff;flex-shrink:0;display:flex;flex-direction:column;padding:20px 14px;}
  .sidebar-header{padding:6px 8px 22px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:#C4D0E2;font-size:14px;font-weight:500;margin-bottom:2px;cursor:pointer;border:none;background:none;width:100%;text-align:left;}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
  .nav-item.active{background:rgba(23,195,178,.16);color:#fff;}
  .nav-item .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0;}
  .nav-item.active .dot{opacity:1;}
  .sidebar-foot{margin-top:auto;padding:12px;font-size:11px;color:#7488A6;line-height:1.5;}
  .main{flex:1;padding:32px 40px;max-width:1180px;}
  .topline{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;flex-wrap:wrap;gap:14px;}
  .topline h2{font-size:24px;}
  .topline p{color:var(--muted);font-size:14px;margin-top:4px;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
  .pad{padding:22px 24px;}

  /* ---------- table / list ---------- */
  .list-row{display:grid;grid-template-columns:1.6fr 1.2fr 1fr 1fr 1fr auto;gap:14px;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);font-size:14px;}
  .list-row:last-child{border-bottom:none;}
  .list-head{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-weight:600;}
  .cand-name{font-weight:600;}
  .cand-role{color:var(--muted);font-size:13px;}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:12px;font-weight:600;}
  .badge-green{background:var(--green-bg);color:var(--green);}
  .badge-amber{background:var(--amber-bg);color:var(--amber);}
  .badge-red{background:var(--red-bg);color:var(--red);}
  .badge-grey{background:#EEF1F6;color:var(--muted);}
  .link-btn{background:none;border:none;color:var(--accent-dark);font-weight:600;font-size:13px;padding:0;}
  .link-btn:hover{text-decoration:underline;}

  .empty{padding:60px 20px;text-align:center;color:var(--muted);}
  .empty .signal-mark{margin-bottom:14px;justify-content:center;width:100%;}

  /* ---------- modal ---------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(11,27,54,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:#fff;border-radius:16px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;padding:28px;}
  .modal h3{font-size:19px;margin-bottom:4px;}
  .modal .close{position:absolute;}
  .modal-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .icon-btn{background:none;border:none;font-size:20px;color:var(--muted);line-height:1;padding:4px;}

  .link-box{display:flex;gap:8px;align-items:center;background:#F5F7FA;border:1.5px dashed var(--border);border-radius:9px;padding:10px 12px;margin-top:8px;}
  .link-box span,.link-box a{flex:1;font-size:12.5px;color:var(--navy-light);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none;}
  .link-box a{cursor:pointer;}
  .link-box a:hover{text-decoration:underline;color:var(--accent-dark);}

  /* ---------- question bank ---------- */
  .q-card{border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;position:relative;}
  .q-tag{display:inline-block;font-size:11px;font-weight:700;color:var(--accent-dark);background:rgba(23,195,178,.12);padding:3px 9px;border-radius:6px;margin-bottom:10px;letter-spacing:.02em;}
  .anchor-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px;}
  .anchor-grid label{font-size:11px;color:var(--muted);font-weight:600;}

  /* ---------- assessment detail ---------- */
  .detail-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
  .score-total{font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;}
  .risk-panel{display:flex;align-items:center;gap:18px;padding:18px 22px;border-radius:var(--radius);margin-bottom:22px;}
  .qa-block{border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;}
  .qa-block h4{font-size:15px;margin-bottom:10px;}
  .qa-video{width:100%;max-width:360px;border-radius:9px;background:#000;display:block;}
  .qa-flex{display:flex;gap:22px;flex-wrap:wrap;}
  .qa-score{min-width:220px;}
  .anchor-hint{font-size:12px;color:var(--muted);background:#F5F7FA;border-radius:8px;padding:9px 11px;margin-top:8px;line-height:1.5;}

  /* ---------- candidate flow ---------- */
  .cand-wrap{flex:1;display:flex;flex-direction:column;align-items:center;background:var(--navy);padding:26px 18px 60px;}
  .cand-shell{width:100%;max-width:560px;}
  .cand-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
  .progress-dots{display:flex;gap:6px;}
  .progress-dots span{width:26px;height:5px;border-radius:3px;background:rgba(255,255,255,.2);}
  .progress-dots span.done{background:var(--accent);}
  .progress-dots span.current{background:#fff;}
  .cand-card{background:#fff;border-radius:18px;padding:32px 30px;box-shadow:0 20px 60px rgba(0,0,0,.35);}
  .cand-card h2{font-size:21px;margin-bottom:8px;}
  .cand-card .role-pill{display:inline-block;background:rgba(23,195,178,.12);color:var(--accent-dark);font-size:12px;font-weight:700;padding:4px 11px;border-radius:100px;margin-bottom:14px;}
  .qtext{font-size:17px;line-height:1.5;font-weight:600;margin:14px 0 18px;}
  .video-stage{position:relative;background:#0F1B2D;border-radius:12px;overflow:hidden;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;}
  .video-stage video{width:100%;height:100%;object-fit:cover;}
  .rec-badge{position:absolute;top:12px;left:12px;background:rgba(220,38,38,.9);color:#fff;font-size:12px;font-weight:700;padding:5px 10px;border-radius:100px;display:flex;align-items:center;gap:6px;}
  .rec-dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:.2;}}
  .timer-badge{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.55);color:#fff;font-size:12px;padding:5px 10px;border-radius:100px;font-family:'JetBrains Mono',monospace;}
  .wave-bar-row{position:absolute;bottom:0;left:0;right:0;height:44px;display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:8px;background:linear-gradient(transparent,rgba(0,0,0,.45));}
  .wave-bar-row div{width:3px;background:var(--accent);border-radius:2px;transition:height .08s;}
  .cand-controls{display:flex;gap:10px;margin-top:18px;}
  .helper{font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.5;}
  .step-label{color:#9FB2CE;font-size:12.5px;font-weight:600;letter-spacing:.03em;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:9px;font-size:13.5px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:100;display:flex;align-items:center;gap:10px;}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:22px;}
  .tab-btn{padding:10px 4px;margin-right:22px;background:none;border:none;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;}
  .tab-btn.active{color:var(--navy);border-color:var(--accent);}

  @media (max-width:760px){
    .shell{flex-direction:column;}
    .sidebar{width:100%;flex-direction:row;align-items:center;padding:12px 16px;overflow-x:auto;}
    .sidebar-header{padding:0 12px 0 0;}
    .sidebar-foot{display:none;}
    .main{padding:22px 16px;}
    .list-row{grid-template-columns:1fr;gap:6px;}
    .list-head{display:none;}
  }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, deleteDoc,
  collection, getDocs, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyByoli0Z4ZhNwd6m3Q1hHAZxvMqIj_DU1o",
  authDomain: "signal-video-assessment.firebaseapp.com",
  projectId: "signal-video-assessment",
  storageBucket: "signal-video-assessment.firebasestorage.app",
  messagingSenderId: "627289727140",
  appId: "1:627289727140:web:fca249c2feada9eeaa4631"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

/* ======================================================================
   SIGNAL — AI Video Assessment Tool (Firestore-backed)
   Collections:
     config/main                 -> {passcode}
     config/questions            -> {list: [{id,category,text,a1,a3,a5}]}
     assessments/{id}            -> meta object (candidateName, role, stage,
                                      createdAt, status, questions, scores,
                                      notes, recordingMeta:{qId:{chunkCount}})
     assessments/{id}/chunks/{qId}_{n} -> {data: base64 fragment, index, total}
   Videos are stored as chunked base64 fragments because a single Firestore
   document is capped at 1MB — this keeps everything on the free Spark plan
   with no Firebase Storage / credit card required.
   ====================================================================== */

const CHUNK_SIZE = 700000; // characters per Firestore doc, safely under 1MB

const DEFAULT_QUESTIONS = [
  {id:'q1', category:'Motivation & Research Effort', weightLabel:'25%',
   text:"What specifically drew you to apply for this role, and what did you do to learn more about CLaaS2SaaS before applying?",
   a1:'Generic reason ("saw the posting", "sounds interesting"); no evidence of research beyond the job ad.',
   a3:'Reasonable personal motivation, with some awareness of the company but nothing beyond surface-level.',
   a5:"Specific, personal reason tied to their own experience or goals, plus clear evidence of real research (product, mission, recent news, team)."},
  {id:'q2', category:'Priority vs. Other Options', weightLabel:'25%',
   text:"Out of everything you're currently exploring, where does this opportunity rank for you, and why?",
   a1:'Evasive on ranking, or openly states this role is a backup / last resort.',
   a3:"Says it's a genuine option among a few, without a strong reason it stands out.",
   a5:'Clearly ranks this role highly, with specific reasons it stands out from other options.'},
  {id:'q3', category:'Decision Readiness', weightLabel:'25%',
   text:"If you were offered this role tomorrow, what — if anything — would need to be true for you to say yes right away?",
   a1:"Long list of unresolved conditions, or can't answer / visibly deflects the question.",
   a3:'One or two reasonable conditions raised (e.g. confirm salary, meet the team) but otherwise ready to move.',
   a5:'Essentially ready to accept — no major open conditions, or key concerns are already resolved.'},
  {id:'q4', category:'Genuine Reflection', weightLabel:'25%',
   text:"What's one part of this role you're least excited about, or unsure you'd enjoy?",
   a1:'Cannot name anything (over-rehearsed "no weaknesses" answer), or the answer reveals a fundamental mismatch.',
   a3:"Names a minor, reasonable concern that doesn't raise major implications.",
   a5:"Thoughtful, specific answer showing genuine self-reflection, where the concern doesn't undermine overall fit."}
];

const BUILD_VERSION = '2026-07-12.FB3 (fixed Gemini model name to gemini-flash-latest)';
const MAX_RECORD_SECONDS = 90;

/* ---------------- storage helpers (Firestore) ---------------- */
async function getConfig(){
  try{
    const snap = await getDoc(doc(db,'config','main'));
    if(snap.exists()) return snap.data();
  }catch(e){ console.error('getConfig failed', e); }
  const def = {passcode:'signal2026'};
  try{ await setDoc(doc(db,'config','main'), def); }catch(e){ console.error('init config failed', e); }
  return def;
}
async function saveConfig(cfg){
  try{ await setDoc(doc(db,'config','main'), cfg); return true; }
  catch(e){ console.error('saveConfig failed', e); return false; }
}
async function getQuestions(){
  try{
    const snap = await getDoc(doc(db,'config','questions'));
    if(snap.exists() && Array.isArray(snap.data().list) && snap.data().list.length) return snap.data().list;
  }catch(e){ console.error('getQuestions failed', e); }
  try{ await setDoc(doc(db,'config','questions'), {list: DEFAULT_QUESTIONS}); }catch(e){}
  return DEFAULT_QUESTIONS;
}
async function saveQuestions(list){
  try{ await setDoc(doc(db,'config','questions'), {list}); return true; }
  catch(e){ console.error('saveQuestions failed', e); return false; }
}
async function getIndex(){
  try{
    const q = query(collection(db,'assessments'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    return snap.docs.map(d=>d.id);
  }catch(e){ console.error('getIndex failed', e); return []; }
}
async function getMeta(id){
  try{
    const snap = await getDoc(doc(db,'assessments',id));
    return snap.exists() ? snap.data() : null;
  }catch(e){ console.error('getMeta failed', e); return null; }
}
async function saveMeta(id, meta){
  try{ await setDoc(doc(db,'assessments',id), meta); return true; }
  catch(e){ console.error('saveMeta failed', e); return false; }
}

/* ---------------- chunked video storage ---------------- */
async function saveRecordingChunks(assessmentId, questionId, base64DataUrl){
  const total = Math.ceil(base64DataUrl.length / CHUNK_SIZE);
  const batchPromises = [];
  for(let i=0;i<total;i++){
    const chunk = base64DataUrl.slice(i*CHUNK_SIZE, (i+1)*CHUNK_SIZE);
    const chunkId = `${questionId}_${i}`;
    batchPromises.push(setDoc(doc(db,'assessments',assessmentId,'chunks',chunkId), {data: chunk, index:i, total}));
  }
  await Promise.all(batchPromises);
  return total;
}
async function loadRecordingDataUrl(assessmentId, questionId, chunkCount){
  const promises = [];
  for(let i=0;i<chunkCount;i++){
    promises.push(getDoc(doc(db,'assessments',assessmentId,'chunks',`${questionId}_${i}`)));
  }
  const snaps = await Promise.all(promises);
  let full = '';
  for(const snap of snaps){
    if(!snap.exists()) throw new Error('Missing recording chunk — data may be incomplete');
    full += snap.data().data;
  }
  return full;
}

function uid(n=8){
  const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
  let s=''; for(let i=0;i<n;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function fmtDate(d){
  return new Date(d).toLocaleDateString('en-SG',{day:'2-digit',month:'short',year:'numeric'});
}
function fmtTime(sec){
  const m = Math.floor(sec/60), s = Math.floor(sec%60);
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function riskBand(total){
  if(total>=4) return {label:'Low Risk — High Interest', cls:'badge-green', panelBg:'var(--green-bg)', panelColor:'var(--green)'};
  if(total>=3) return {label:'Medium Risk — Monitor', cls:'badge-amber', panelBg:'var(--amber-bg)', panelColor:'var(--amber)'};
  return {label:'High Risk — Flight Risk', cls:'badge-red', panelBg:'var(--red-bg)', panelColor:'var(--red)'};
}
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg){
  const el = document.createElement('div');
  el.className='toast';
  el.innerHTML = '<span class="signal-mark"><span></span><span></span><span></span><span></span></span>'+escapeHtml(msg);
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2600);
}
function getBaseUrl(){
  return location.origin + location.pathname;
}
function copyLink(url){
  navigator.clipboard.writeText(url).then(()=>toast('Link copied to clipboard')).catch(()=>toast('Could not copy — select and copy manually'));
}

/* ---------------- router ---------------- */
let RECRUITER_UNLOCKED = sessionStorage.getItem ? false : false; // in-memory only, per tab
let unlocked = false;

function parseHash(){
  const h = location.hash.replace(/^#/, '');
  const params = {};
  h.split('&').forEach(pair=>{
    const [k,v] = pair.split('=');
    if(k) params[k] = decodeURIComponent(v||'');
  });
  return params;
}

async function router(){
  const params = parseHash();
  // Hash routing only works when the browser's real address bar hash reaches
  // this document (e.g. opened as a local/self-hosted file). Published
  // Claude artifacts render inside a sandboxed iframe that can't see the
  // parent tab's URL, so this will rarely fire there — renderLanding()
  // below is the path that actually works in that environment.
  if(params.assessment){
    await renderCandidateFlow(params.assessment);
  } else if(params.tab){
    await renderRecruiterArea(params.tab);
  } else if(params.recruiter){
    await renderRecruiterArea('assessments');
  } else {
    await renderLanding();
  }
}
window.addEventListener('hashchange', router);

async function renderLanding(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="gate-wrap">
      <div class="gate-card" style="max-width:420px;">
        <span class="signal-mark pulse"><span></span><span></span><span></span><span></span></span>
        <h1>Signal</h1>
        <p>CLaaS2SaaS video assessment portal. Choose how you're joining.</p>

async function scoreWithGemini(apiKey, role, questions, transcripts){
  const qaText = questions.map((q,i)=>
    `Q${i+1} [${q.category}]: ${q.text}\nCandidate's answer (auto-transcribed, may contain minor errors): ${transcripts[q.id] || '(no transcript captured for this answer)'}`
  ).join('\n\n');

  const prompt = `You are helping a recruiter score a candidate's interest and seriousness about a role, based on transcribed video interview answers. Use only the content of what they said — you cannot assess tone, appearance, or delivery.

Role applied for: ${role}

${qaText}

Score each answer on a 1 (Low) to 5 (High) scale for how much genuine interest, preparation, and seriousness it shows, using this rubric:
1 = generic, no research, passive, nothing beyond logistics.
2 = some genuine interest but thin on specifics.
3 = reasonable engagement, some specifics.
4 = clear "why this role" narrative, thoughtful, engaged.
5 = all of the above, plus proactive, forward-looking, highly specific answers.

Respond with ONLY valid JSON, no markdown, no preamble, in this exact shape:
{"scores": {${questions.map(q=>`"${q.id}": 0`).join(', ')}}, "summary": "2-3 sentence recruiter-style note"}`;

  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${encodeURIComponent(apiKey)}`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  if(!resp.ok){
    const errBody = await resp.text().catch(()=>'');
    throw new Error(`Gemini API returned ${resp.status}${errBody ? ' — '+errBody.slice(0,200) : ''}`);
  }
  const data = await resp.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!text) throw new Error('Gemini response had no content — check your API key and quota');
  const clean = text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

function dataUrlToBlob(dataUrl){
  const commaIdx = dataUrl.indexOf(',');
  const header = dataUrl.slice(0, commaIdx);
  const base64 = dataUrl.slice(commaIdx+1);
  const mimeMatch = header.match(/data:(.*);base64/);
  const mime = mimeMatch ? mimeMatch[1] : 'video/webm';
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], {type: mime});
}

async function downloadAllRecordingsZip(){
  if(typeof JSZip === 'undefined'){
    toast('Zip library failed to load — check your connection and try again');
    return;
  }
  const idx = await getIndex();
  if(!idx.length){ toast('No assessments to download yet'); return; }
  const metas = (await Promise.all(idx.map(id=>getMeta(id)))).filter(Boolean);
  let fileCount = 0;
  const zip = new JSZip();
  toast('Fetching recordings — this may take a while for many candidates…');
  for(const m of metas){
    const safeName = (m.candidateName||'candidate').replace(/[^a-z0-9]+/gi,'_').toLowerCase();
    const questions = m.questions || [];
    for(let i=0;i<questions.length;i++){
      const q = questions[i];
      const rec = m.recordings ? m.recordings[q.id] : null;
      if(rec && rec.chunkCount){
        try{
          const dataUrl = await loadRecordingDataUrl(m.id, q.id, rec.chunkCount);
          const blob = dataUrlToBlob(dataUrl);
          zip.file(`${safeName}_${m.id}/${safeName}_q${i+1}.webm`, blob);
          fileCount++;
        }catch(e){ console.error('Failed to fetch recording for zip', m.id, q.id, e); }
      }
    }
  }
  if(fileCount === 0){ toast('No recordings have been submitted yet'); return; }
  toast(`Zipping ${fileCount} recording${fileCount===1?'':'s'}…`);
  const content = await zip.generateAsync({type:'blob'});
  const url = URL.createObjectURL(content);
  const a = document.createElement('a');
  a.href = url;
  a.download = `signal_recordings_${new Date().toISOString().slice(0,10)}.zip`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
  toast('Zip downloaded');
}

async function exportAssessmentsToExcel(){
  const idx = await getIndex();
  if(!idx.length){ toast('No assessments to export yet'); return; }
  const metas = (await Promise.all(idx.map(id=>getMeta(id)))).filter(Boolean);
  metas.sort((a,b)=> (b.createdAt||0) - (a.createdAt||0));

  const rows = metas.map(m=>{
    const scores = m.scores || {};
    const questions = m.questions || [];
    const answered = m.recordings ? Object.keys(m.recordings).length : 0;
    const total = questions.length;
    const scoredAll = total && questions.every(q=> scores[q.id]!=null);
    let avgScore = '', risk = '';
    if(scoredAll){
      const avg = questions.reduce((s,q)=>s+Number(scores[q.id]||0),0)/total;
      avgScore = Number(avg.toFixed(2));
      risk = riskBand(avg).label;
    }
    const safeName = (m.candidateName||'candidate').replace(/[^a-z0-9]+/gi,'_').toLowerCase();
    const recordingFiles = questions.map((q,i)=> m.recordings && m.recordings[q.id] ? `${safeName}_q${i+1}.webm` : '').filter(Boolean).join(', ');
    return {
      'Candidate Name': m.candidateName || '',
      'Role': m.role || '',
      'Stage': m.stage || '',
      'Date Created': m.createdAt ? new Date(m.createdAt).toISOString().slice(0,10) : '',
      'Status': answered>=total && total>0 ? 'Submitted' : (answered>0 ? 'In progress' : 'Not started'),
      'Answered': `${answered}/${total}`,
      'Average Score (1-5)': avgScore,
      'Risk Band': risk,
      'Assessment Code': m.id,
      'Recording File Names': recordingFiles,
      'Recruiter Notes': m.notes || ''
    };
  });

  if(typeof XLSX === 'undefined'){
    toast('Excel library failed to load — check your connection and try again');
    return;
  }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [
    {wch:22},{wch:22},{wch:14},{wch:12},{wch:12},{wch:10},{wch:16},{wch:22},{wch:14},{wch:34},{wch:40}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Assessments');
  const dateStr = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `signal_assessments_${dateStr}.xlsx`);
  toast('Excel file downloaded');
}

    <button class="btn btn-primary btn-block" id="saveDetailBtn" style="margin-top:16px;">Save scores &amp; notes</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  document.getElementById('closeDetail').addEventListener('click', ()=>overlay.remove());
  document.getElementById('copyPortal').addEventListener('click', ()=>copyLink(base));
  document.getElementById('copyCode').addEventListener('click', ()=>copyLink(code));
  document.getElementById('scoreAiBtn').addEventListener('click', async ()=>{
    const resultBox = document.getElementById('aiScoreResult');
    const cfg = await getConfig();
    if(!cfg.geminiApiKey){
      resultBox.innerHTML = `<div class="error-text">No Gemini API key configured yet — add one for free in Settings first.</div>`;
      return;
    }
    const transcripts = {};
    let anyTranscript = false;
    (meta.questions||[]).forEach(q=>{
      const rec = meta.recordings ? meta.recordings[q.id] : null;
      if(rec && rec.transcript){ transcripts[q.id] = rec.transcript; anyTranscript = true; }
    });
    if(!anyTranscript){
      resultBox.innerHTML = `<div class="error-text">No transcripts were captured for this candidate's answers (their browser may not have supported live transcription). AI scoring needs a transcript to work.</div>`;
      return;
    }
    const btn = document.getElementById('scoreAiBtn');
    btn.disabled = true; btn.textContent = 'Scoring…';
    resultBox.innerHTML = `<div class="loader"><div class="spinner"></div>Asking Gemini to review the transcripts…</div>`;
    try{
      const result = await scoreWithGemini(cfg.geminiApiKey, meta.role, meta.questions||[], transcripts);
      (meta.questions||[]).forEach(q=>{
        const suggested = result.scores ? result.scores[q.id] : null;
        if(suggested!=null){
          const sel = overlay.querySelector(`[data-score="${q.id}"]`);
          if(sel) sel.value = String(suggested);
        }
      });
      resultBox.innerHTML = `<div class="card pad" style="background:#F5F7FA;">
        <strong style="font-size:13px;">AI suggestion (review before saving):</strong>
        <p style="font-size:13.5px;color:var(--muted);margin:6px 0 0;line-height:1.5;">${escapeHtml(result.summary||'')}</p>
      </div>`;
      toast('AI scores filled in — review and adjust before saving');
    }catch(e){
      console.error('scoreWithGemini failed', e);
      resultBox.innerHTML = `<div class="error-text">AI scoring failed — ${escapeHtml(e.message||String(e))}</div>`;
    }
    btn.disabled = false; btn.textContent = '✨ Score with AI';
  });
  overlay.querySelectorAll('[data-load-rec]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const qId = btn.dataset.loadRec;
      const chunkCount = Number(btn.dataset.chunks);
      const fileName = btn.dataset.filename;
      const container = document.getElementById('qa-video-'+qId);
      btn.disabled = true; btn.textContent = 'Loading…';
      try{
        const dataUrl = await loadRecordingDataUrl(id, qId, chunkCount);
        container.innerHTML = `<video class="qa-video" controls src="${dataUrl}"></video>
          <a class="btn btn-ghost" href="${dataUrl}" download="${fileName}" style="margin-top:8px;display:inline-flex;padding:7px 12px;font-size:13px;">⬇ Download this recording</a>`;
      }catch(e){
        console.error('loadRecordingDataUrl failed', e);
        container.innerHTML = `<div class="error-text">Couldn't load this recording — ${escapeHtml(e.message||String(e))}</div>`;
      }
    });
  });
  document.getElementById('saveDetailBtn').addEventListener('click', async ()=>{
    const newScores = {};
    overlay.querySelectorAll('[data-score]').forEach(sel=>{
      if(sel.value !== '') newScores[sel.dataset.score] = Number(sel.value);
    });
    meta.scores = newScores;
    meta.notes = document.getElementById('notesArea').value;
    await saveMeta(id, meta);
    toast('Saved');
    overlay.remove();
    renderAssessmentsTab();
  });
}

async function renderQuestionsTab(){
  const main = document.getElementById('main');
  const questions = await getQuestions();
  main.innerHTML = `<div class="topline"><div>
    <h2>Question bank</h2><p>These questions are used for every new assessment link you generate. Existing assessments keep the question set they were created with.</p>
  </div></div>
  <div id="qList"></div>
  <div style="display:flex;gap:10px;margin-top:6px;">
    <button class="btn btn-ghost" id="addQ">+ Add question</button>
    <button class="btn btn-accent" id="saveQ">Save question bank</button>
  </div>`;

  function renderList(qs){
    const evenWeight = qs.length ? Math.round(100/qs.length) : 0;
    document.getElementById('qList').innerHTML = qs.map((q,i)=>`
      <div class="q-card" data-idx="${i}">
        <span class="q-tag">Q${i+1} · weight ${evenWeight}%</span>
        <button class="icon-btn" data-del="${i}" style="position:absolute;top:14px;right:14px;">✕</button>
        <div class="field" style="margin-bottom:10px;"><label>Category</label><input type="text" data-field="category" value="${escapeHtml(q.category)}"></div>
        <div class="field"><label>Question (asked in the video)</label><textarea data-field="text">${escapeHtml(q.text)}</textarea></div>
        <div class="anchor-grid">
          <div><label>Score 1 — weak signal</label><textarea data-field="a1" style="min-height:60px;">${escapeHtml(q.a1)}</textarea></div>
          <div><label>Score 3 — moderate signal</label><textarea data-field="a3" style="min-height:60px;">${escapeHtml(q.a3)}</textarea></div>
          <div><label>Score 5 — strong signal</label><textarea data-field="a5" style="min-height:60px;">${escapeHtml(q.a5)}</textarea></div>
        </div>
      </div>`).join('') || '<div class="empty">No questions — add one to get started.</div>';
    document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>{
      qs.splice(Number(b.dataset.del),1); renderList(qs);
    }));
  }
  renderList(questions);

  document.getElementById('addQ').addEventListener('click', ()=>{
    questions.push({id:'q'+uid(4), category:'New category', text:'New question text…', a1:'', a3:'', a5:''});
    renderList(questions);
  });
  document.getElementById('saveQ').addEventListener('click', async ()=>{
    const cards = document.querySelectorAll('.q-card');
    const updated = [];
    cards.forEach(card=>{
      const idx = Number(card.dataset.idx);
      const orig = questions[idx];
      updated.push({
        id: orig.id,
        category: card.querySelector('[data-field=category]').value.trim() || 'Untitled',
        text: card.querySelector('[data-field=text]').value.trim(),
        a1: card.querySelector('[data-field=a1]').value.trim(),
        a3: card.querySelector('[data-field=a3]').value.trim(),
        a5: card.querySelector('[data-field=a5]').value.trim(),
      });
    });
    await saveQuestions(updated);
    toast('Question bank saved');
  });
}

  <div class="card pad" style="max-width:460px;">
    <div class="field" style="margin-bottom:16px;"><label>Recruiter passcode</label>

    </div>
    <button class="btn btn-primary" id="savePasscode">Save passcode</button>
  </div>
  <div class="card pad" style="max-width:460px;margin-top:16px;">
    <h4 style="margin-bottom:8px;">Site link</h4>
    <div class="link-box"><a class="mono" href="${currentBase}" target="_blank" rel="noopener">${currentBase}</a></div>
    <p class="helper">This is the address candidates and hiring managers should use. Since this is hosted on GitHub Pages (not a Claude artifact), this link is stable and works normally.</p>
  </div>
  <div class="card pad" style="max-width:460px;margin-top:16px;">
    <h4 style="margin-bottom:8px;">AI scoring (optional)</h4>
    <p class="helper" style="margin-top:0;">Paste a free Gemini API key to enable AI-suggested scores in the recruiter console. Get one at <span class="mono">aistudio.google.com</span> — no credit card required. This key is stored in Firestore and used directly from the browser, so it isn't fully hidden from anyone inspecting this page's code; the free tier has no billing attached, so the practical risk is low (someone could exhaust your daily quota, not run up a bill).</p>
    <div class="field" style="margin-top:12px;"><label>Gemini API key</label>
      <input type="text" id="geminiKeyField" value="${escapeHtml(cfg.geminiApiKey||'')}" placeholder="AIza...">
    </div>
    <button class="btn btn-primary" id="saveGeminiKey" style="margin-top:10px;">Save API key</button>
  </div>
  <div class="card pad" style="max-width:460px;margin-top:16px;">
    <h4 style="margin-bottom:8px;">Firestore diagnostic</h4>
    <p class="helper" style="margin-top:0;">If assessments won't save or candidate codes won't be found, run this to confirm your Firebase project is reachable and configured correctly.</p>
    <button class="btn btn-ghost" id="runDiag" style="margin-top:8px;">Run diagnostic</button>
    <div id="diagResults" style="margin-top:14px;font-size:12.5px;line-height:1.7;"></div>
  </div>`;
  document.getElementById('saveGeminiKey').addEventListener('click', async ()=>{
    const val = document.getElementById('geminiKeyField').value.trim();
    cfg.geminiApiKey = val;
    await saveConfig(cfg);
    toast(val ? 'Gemini API key saved' : 'Gemini API key cleared');
  });
  document.getElementById('savePasscode').addEventListener('click', async ()=>{
    const val = document.getElementById('passcodeField').value.trim();
    if(!val){ toast('Passcode cannot be empty'); return; }
    cfg.passcode = val;
    await saveConfig(cfg);
    toast('Passcode updated');
  });
  document.getElementById('runDiag').addEventListener('click', async ()=>{
    const out = document.getElementById('diagResults');
    out.innerHTML = 'Running…';
    const lines = [];
    const testId = 'diag_'+Date.now();

    async function tryOp(label, fn){
      try{
        await fn();
        lines.push(`<div style="color:var(--green);">✓ ${label}</div>`);
      }catch(e){
        lines.push(`<div style="color:var(--red);">✗ ${label} — ${escapeHtml(e && e.message ? e.message : String(e))}</div>`);
      }
    }

    await tryOp('Write a test document to Firestore', async ()=>{
      await setDoc(doc(db,'diagnostics',testId), {t:Date.now()});
    });
    await tryOp('Read that document back', async ()=>{
      const snap = await getDoc(doc(db,'diagnostics',testId));
      if(!snap.exists()) throw new Error('Document not found after write — check Firestore rules');
    });
    await tryOp('Delete the test document', async ()=>{
      await deleteDoc(doc(db,'diagnostics',testId));
    });
    await tryOp('List assessments collection', async ()=>{
      await getDocs(collection(db,'assessments'));
    });

    out.innerHTML = lines.join('') + `<p class="helper" style="margin-top:10px;">If any of these show ✗ with a "permission" or "insufficient rights" message, check your Firestore Rules tab in the Firebase console — they may need to be reset to test mode or updated.</p>`;
  });
}

   HIRING MANAGER REVIEW (read-only, shareable, no passcode required)
   ================================================================== */
/* ==================================================================
   CANDIDATE FLOW
   ================================================================== */
async function renderCandidateFlow(id){
  const app = document.getElementById('app');
  const meta = await getMeta(id);
  if(!meta){
    app.innerHTML = `<div class="cand-wrap"><div class="cand-shell"><div class="cand-card" style="text-align:center;">
      <span class="signal-mark"><span></span><span></span><span></span><span></span></span>
      <h2 style="margin-top:14px;">Link not found</h2>
      <p style="color:var(--muted);font-size:14px;">This assessment link is invalid or has been removed. Please check with your recruiter.</p>
    </div></div></div>`;
    return;
  }
  const questions = meta.questions || [];
  let step = 'welcome'; // welcome | recording | done
  let qi = 0;
  let stream = null, recorder = null, chunks = [], recording = false, startTime = 0, timerHandle = null, audioCtx = null, analyser = null, rafId = null;
  let lastBlobUrl = null, lastBlobBase64 = null;
  let recognition = null, lastTranscript = '';

  function progressDots(){
    return `<div class="progress-dots">${questions.map((_,i)=>`<span class="${i<qi?'done':i===qi?'current':''}"></span>`).join('')}</div>`;
  }

  function renderWelcome(){
    app.innerHTML = `<div class="cand-wrap"><div class="cand-shell">
      <div class="cand-header"><div class="brand"><span class="signal-mark"><span></span><span></span><span></span><span></span></span>Signal</div></div>
      <div class="cand-card">
        <div class="role-pill">${escapeHtml(meta.role)}</div>
        <h2>Hi ${escapeHtml(meta.candidateName.split(' ')[0])}, ready for your video assessment?</h2>
        <p style="color:var(--muted);font-size:14px;line-height:1.6;">
          You'll answer ${questions.length} short question${questions.length===1?'':'s'} on video — about ${questions.length*1}–${questions.length*2} minutes total.
          There's no script; speak naturally. You can re-record any answer before moving on.
        </p>
        <div class="helper" style="background:#F5F7FA;padding:12px 14px;border-radius:9px;">
          We'll ask to use your camera and microphone. Recordings are only visible to the CLaaS2SaaS recruiting team and the hiring manager for this role.
        </div>
        <button class="btn btn-accent btn-block" id="startBtn" style="margin-top:20px;">Turn on camera &amp; begin</button>
      </div>
    </div></div>`;
    document.getElementById('startBtn').addEventListener('click', beginQuestion);
  }

  async function beginQuestion(){
    step = 'recording';
    await renderQuestionScreen();
  }

  async function setupStream(){
    if(stream) return stream;
    stream = await navigator.mediaDevices.getUserMedia({ video:{width:480,height:360}, audio:true });
    return stream;
  }

  async function renderQuestionScreen(){
    const q = questions[qi];
    app.innerHTML = `<div class="cand-wrap"><div class="cand-shell">
      <div class="cand-header">
        <div class="step-label">Question ${qi+1} of ${questions.length}</div>
        ${progressDots()}
      </div>
      <div class="cand-card">
        <div class="role-pill">${escapeHtml(meta.role)}</div>
        <div class="qtext">${escapeHtml(q.text)}</div>
        <div class="video-stage" id="videoStage">
          <video id="liveVideo" autoplay muted playsinline></video>
        </div>
        <div class="cand-controls" id="controlsRow"></div>
        <div class="helper" id="helperMsg">Camera loading…</div>
      </div>
    </div></div>`;

    const controls = document.getElementById('controlsRow');
    const helper = document.getElementById('helperMsg');
    const liveVideo = document.getElementById('liveVideo');

    try{
      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        throw new Error('navigator.mediaDevices.getUserMedia is not available in this context (often a sign the page is running inside a restricted/sandboxed frame without camera+microphone permission delegated to it).');
      }
      await setupStream();
      liveVideo.srcObject = stream;
      helper.textContent = `Answers auto-stop after ${MAX_RECORD_SECONDS} seconds. Take a breath, then hit record when ready.`;
      controls.innerHTML = `<button class="btn btn-accent btn-block" id="recBtn">● Start recording</button>`;
      document.getElementById('recBtn').addEventListener('click', startRecording);
    }catch(e){
      const errName = e && e.name ? e.name : 'Error';
      const errMsg = e && e.message ? e.message : String(e);
      console.error('getUserMedia failed:', errName, errMsg);
      helper.innerHTML = `<span style="color:var(--red);">Couldn't access your camera/microphone.<br><span class="mono" style="font-size:11px;">${escapeHtml(errName)}: ${escapeHtml(errMsg)}</span></span>`;
      controls.innerHTML = `<button class="btn btn-ghost btn-block" id="retryCam">Try again</button>`;
      document.getElementById('retryCam').addEventListener('click', renderQuestionScreen);
    }
  }

  function startRecording(){
    chunks = [];
    let mimeType = 'video/webm;codecs=vp8,opus';
    if(!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
    try{
      recorder = new MediaRecorder(stream, {mimeType, videoBitsPerSecond:300000, audioBitsPerSecond:64000});
    }catch(e){
      recorder = new MediaRecorder(stream);
    }
    recorder.ondataavailable = e=>{ if(e.data && e.data.size>0) chunks.push(e.data); };
    recorder.onstop = onRecordingStop;
    recorder.start();
    recording = true;
    startTime = Date.now();

    document.getElementById('videoStage').insertAdjacentHTML('beforeend',
      `<div class="rec-badge"><span class="rec-dot"></span>REC</div>
       <div class="timer-badge" id="timerBadge">00:00</div>
       <div class="wave-bar-row" id="waveRow">${Array.from({length:22}).map(()=>'<div style="height:4px;"></div>').join('')}</div>`);
    document.getElementById('controlsRow').innerHTML = `<button class="btn btn-danger btn-block" id="stopBtn">■ Stop recording</button>`;
    document.getElementById('stopBtn').addEventListener('click', stopRecording);
    document.getElementById('helperMsg').textContent = "Recording… speak clearly, and stop whenever you've finished your answer.";

    timerHandle = setInterval(()=>{
      const elapsed = (Date.now()-startTime)/1000;
      const badge = document.getElementById('timerBadge');
      if(badge) badge.textContent = fmtTime(elapsed);
      if(elapsed >= MAX_RECORD_SECONDS) stopRecording();
    }, 250);

    setupWaveform();
    startTranscription();
  }

  function startTranscription(){
    lastTranscript = '';
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){ recognition = null; return; } // silently skip if browser doesn't support it
    try{
      recognition = new SR();
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.lang = 'en-US';
      recognition.onresult = (event)=>{
        let finalText = '';
        for(let i=0;i<event.results.length;i++){
          if(event.results[i].isFinal) finalText += event.results[i][0].transcript + ' ';
        }
        lastTranscript = finalText.trim();
      };
      recognition.onerror = ()=>{}; // non-fatal — scoring just won't have a transcript for this answer
      recognition.start();
    }catch(e){ recognition = null; }
  }
  function stopTranscription(){
    if(recognition){ try{ recognition.stop(); }catch(e){} }
  }

  function setupWaveform(){
    try{
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 64;
      source.connect(analyser);
      const data = new Uint8Array(analyser.frequencyBinCount);
      const draw = ()=>{
        if(!recording) return;
        analyser.getByteFrequencyData(data);
        const row = document.getElementById('waveRow');
        if(row){
          const bars = row.children;
          for(let i=0;i<bars.length;i++){
            const v = data[i % data.length] || 0;
            bars[i].style.height = Math.max(4, (v/255)*36) + 'px';
          }
        }
        rafId = requestAnimationFrame(draw);
      };
      draw();
    }catch(e){ /* waveform is cosmetic; ignore failures */ }
  }

  function stopRecording(){
    if(!recording) return;
    recording = false;
    clearInterval(timerHandle);
    if(rafId) cancelAnimationFrame(rafId);
    if(audioCtx){ audioCtx.close().catch(()=>{}); audioCtx=null; }
    stopTranscription();
    if(recorder && recorder.state !== 'inactive') recorder.stop();
  }

  function onRecordingStop(){
    const blob = new Blob(chunks, {type:'video/webm'});
    lastBlobUrl = URL.createObjectURL(blob);
    const reader = new FileReader();
    reader.onloadend = ()=>{
      lastBlobBase64 = reader.result;
      renderPreviewScreen(blob.size);
    };
    reader.readAsDataURL(blob);
  }

  function renderPreviewScreen(sizeBytes){
    const q = questions[qi];
    const tooBig = sizeBytes > 4.6*1024*1024;
    app.innerHTML = `<div class="cand-wrap"><div class="cand-shell">
      <div class="cand-header">
        <div class="step-label">Question ${qi+1} of ${questions.length}</div>
        ${progressDots()}
      </div>
      <div class="cand-card">
        <div class="role-pill">${escapeHtml(meta.role)}</div>
        <div class="qtext">${escapeHtml(q.text)}</div>
        <div class="video-stage"><video controls src="${lastBlobUrl}" style="width:100%;height:100%;object-fit:cover;"></video></div>
        ${tooBig ? `<div class="helper" style="color:var(--red);">That answer is a little long to save reliably — try re-recording something a bit shorter.</div>`
                 : `<div class="helper">Happy with that answer? Continue, or re-record.</div>`}
        <div class="cand-controls">
          <button class="btn btn-ghost btn-block" id="redoBtn">Re-record</button>
          <button class="btn btn-accent btn-block" id="nextBtn" ${tooBig?'disabled':''}>${qi === questions.length-1 ? 'Finish & submit' : 'Save & continue'}</button>
        </div>
      </div>
    </div></div>`;
    document.getElementById('redoBtn').addEventListener('click', ()=>{ step='recording'; renderQuestionScreen(); });
    document.getElementById('nextBtn').addEventListener('click', saveAnswerAndAdvance);
  }

  async function saveAnswerAndAdvance(){
    const nextBtn = document.getElementById('nextBtn');
    nextBtn.disabled = true; nextBtn.textContent = 'Uploading video…';
    const q = questions[qi];

    let chunkCount;
    try{
      chunkCount = await saveRecordingChunks(id, q.id, lastBlobBase64);
    }catch(e){
      console.error('saveRecordingChunks failed', e);
      toast('Could not upload the recording — check your connection and try again');
      nextBtn.disabled=false; nextBtn.textContent='Save & continue'; return;
    }

    nextBtn.textContent = 'Saving…';
    const freshMeta = await getMeta(id) || meta;
    freshMeta.recordings = freshMeta.recordings || {};
    freshMeta.recordings[q.id] = { chunkCount, recordedAt: Date.now(), transcript: lastTranscript || '' };
    freshMeta.status = 'in_progress';
    const ok = await saveMeta(id, freshMeta);
    Object.assign(meta, freshMeta);
    if(!ok){ toast('Could not save — check your connection and try again'); nextBtn.disabled=false; nextBtn.textContent='Save & continue'; return; }

    if(qi === questions.length - 1){
      meta.status = 'submitted';
      await saveMeta(id, meta);
      if(stream) stream.getTracks().forEach(t=>t.stop());
      renderThankYou();
    } else {
      qi += 1;
      renderQuestionScreen();
    }
  }

  function renderThankYou(){
    app.innerHTML = `<div class="cand-wrap"><div class="cand-shell">
      <div class="cand-card" style="text-align:center;">
        <span class="signal-mark"><span></span><span></span><span></span><span></span></span>
        <h2 style="margin-top:14px;">Thanks, ${escapeHtml(meta.candidateName.split(' ')[0])} — you're all set.</h2>
        <p style="color:var(--muted);font-size:14px;line-height:1.6;">Your responses have been submitted for the <strong>${escapeHtml(meta.role)}</strong> role. The CLaaS2SaaS recruiting team will follow up on next steps.</p>
      </div>
    </div></div>`;
  }

  renderWelcome();
}
